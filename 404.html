<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Raneesh MR — Page Not Found</title>
  <meta name="robots" content="noindex" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Outfit:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    :root { --navy:#071728; --gold:#C8973C; }
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    body {
      font-family: 'Outfit', sans-serif;
      background: var(--navy);
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    .wrap { max-width: 480px; }
    .num {
      font-family: 'Playfair Display', serif;
      font-size: clamp(80px, 15vw, 140px);
      font-weight: 700;
      color: var(--gold);
      line-height: 1;
      margin-bottom: 16px;
    }
    h1 { font-size: 24px; font-weight: 600; margin-bottom: 12px; }
    p { color: rgba(255,255,255,.55); font-size: 16px; margin-bottom: 32px; line-height: 1.7; }
    a {
      display: inline-block;
      background: var(--gold);
      color: var(--navy);
      padding: 14px 32px;
      border-radius: 4px;
      font-weight: 700;
      font-size: 14px;
      letter-spacing: .06em;
      text-transform: uppercase;
      text-decoration: none;
      transition: opacity .2s;
    }
    a:hover { opacity: .85; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="num">404</div>
    <h1>Page Not Found</h1>
    <p>This page doesn't exist — but the rest of the site does. Let's get you back on track.</p>
    <a href="/">Back to Home</a>
  </div>
</body>
</html>
